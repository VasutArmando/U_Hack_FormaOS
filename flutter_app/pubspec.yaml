name: forma_os_app
description: Frontend for FORMA OS System
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  firebase_core: ^2.24.2
  cloud_firestore: ^4.14.0
  firebase_auth: ^4.15.0
  google_sign_in: ^6.2.1
  http: ^1.6.0
  fl_chart: ^1.2.0
  get_it: ^7.6.4
  flutter_bloc: ^8.1.3
  web_socket_channel: ^2.4.0
  connectivity_plus: ^6.0.3
  speech_to_text: ^6.5.0
  flutter_tts: ^3.8.3
  provider: ^6.1.5+1

dev_dependencies:
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true

  shaders:
    - shaders/voronoi.frag
