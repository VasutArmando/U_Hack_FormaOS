name: forma_os_app
description: Frontend for FORMA OS System
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  firebase_core: ^3.6.0
  cloud_firestore: ^5.4.4
  firebase_auth: ^5.3.1
  google_sign_in: ^6.2.1
  http: ^1.6.0
  fl_chart: ^0.69.0
  get_it: ^7.6.4
  flutter_bloc: ^8.1.3
  web_socket_channel: ^3.0.1
  connectivity_plus: ^6.0.3
  speech_to_text: ^7.0.0
  flutter_tts: ^4.2.5
  provider: ^6.1.5+1
  shared_preferences: ^2.5.5
  intl: ^0.20.2
  flutter_dotenv: ^6.0.1

dev_dependencies:
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true

  assets:
    - assets/mock_data/
